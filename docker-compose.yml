services:
  # PostgreSQL 16 pour la base de données
  postgres:
    image: postgres:16-alpine
    container_name: smart-collect-postgres
    environment:
      POSTGRES_USER: smart_collect_user
      POSTGRES_PASSWORD: smart_collect_password_dev
      POSTGRES_DB: smart_collect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smart_collect_user -d smart_collect']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-collect-network

  # Mosquitto MQTT Broker pour IoT
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smart-collect-mosquitto
    ports:
      - '1883:1883'
      - '8883:8883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - smart-collect-network
    depends_on:
      - postgres

  # Redis pour cache et sessions (optionnel mais recommandé)
  redis:
    image: redis:7-alpine
    container_name: smart-collect-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - smart-collect-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local
  redis_data:
    driver: local

networks:
  smart-collect-network:
    driver: bridge
