# Mosquitto MQTT Configuration

# Listener port
listener 1883
protocol mqtt

# WebSocket
listener 9001
protocol websocket

# Secure port (TLS)
listener 8883
protocol mqtt
certfile /mosquitto/certs/cert.crt
keyfile /mosquitto/certs/cert.key

# Authentification (décommenter et configurer si nécessaire)
# allow_anonymous false
# password_file /mosquitto/config/passwd

# Persistance
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
